version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: postgres-bi
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: retail
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  metabase:
    image: metabase/metabase
    container_name: metabase-bi
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  pgdata: